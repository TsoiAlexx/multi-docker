sudo: required
services:
 - docker

before_install:
 - docker build -t mark/react-test -f ./client/Dockerfile.dev ./client

script:
 - docker run -e CI=true mark/react-test npm test

after_success:
 - docker build -t multi-client ./client
 - docker build -t multi-nginx ./nginx
 - docker build -t multi-api ./api
 - docker build -t multi-worker ./worker

 #Log in to the docker CLI
 - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_ID" --password-stdin

 # Take those images and push them to docker hub
 - docker tag multi-client tsoialeksei17537/multi-client
 - docker tag multi-nginx tsoialeksei17537/multi-nginx
 - docker tag multi-api tsoialeksei17537/multi-api
 - docker tag multi-worker tsoialeksei17537/multi-worker
 - docker push tsoialeksei17537/multi-client
 - docker push tsoialeksei17537/multi-nginx
 - docker push tsoialeksei17537/multi-api
 - docker push tsoialeksei17537/multi-worker

deploy:
  provider: elasticbeanstalk
  region: 'ap-northeast-2'
  app: 'multi-docker'
  env: 'Multi-docker-env'
  bucket_name: 'elasticbeanstalk-ap-northeast-2-211125608529'
  bucket_path: 'docker-multi'
  on:
    branch: master
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: $AWS_SECRET_KEY